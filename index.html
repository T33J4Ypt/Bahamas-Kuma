<!DOCTYPE html>
<html lang="pt">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Calculadora de Materiais</h1>

    <tr>
      <th>Produto</th>

<table>

  </thead>

<script src="fabricacao.js"></script>

</body>
</html>
